# Retrieval Multi-Repr Training Config - 完全独立，与 train_retrieval.py 解耦

FOLDER: './checkpoints'
TEST_FOLDER: './checkpoints/results'
Retrieval_CHECKPOINT_DIR: './checkpoints/retrieval_models'

NAME: 'Retrieval_multi_repr_training'

SEED_VALUE: 1234

# ==================== 训练参数 ====================
TRAIN:
  BATCH_SIZE: 64
  SPLIT: 'train'
  NUM_WORKERS: 8
  PERSISTENT_WORKERS: true
  EPOCHS: 51
  PRETRAINED: ''

  validation_steps: -1
  validation_epochs: 50
  checkpointing_steps: -1
  checkpointing_epochs: 50
  max_train_steps: -1
  max_train_epochs: 101
  learning_rate: 1e-4
  lr_scheduler: "cosine"
  lr_warmup_steps: 1000
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 0.0
  adam_epsilon: 1e-08
  max_grad_norm: 1.0
  model_ema: false
  model_ema_steps: 32
  model_ema_decay: 0.999
  save_freq: 5
  num_workers: 4

# ==================== 验证/测试参数 ====================
VAL:
  BATCH_SIZE: 8
  SPLIT: 'test'
  NUM_WORKERS: 12
  PERSISTENT_WORKERS: true

TEST:
  BATCH_SIZE: 4
  SPLIT: 'test'
  NUM_WORKERS: 12
  PERSISTENT_WORKERS: true
  CHECKPOINTS: ''
  REPLICATION_TIMES: 20
  MM_NUM_SAMPLES: 100
  MM_NUM_REPEATS: 30
  MM_NUM_TIMES: 10
  DIVERSITY_TIMES: 300
  DO_MM_TEST: true

# ==================== 数据集参数 ====================
DATASET:
  NAME: 'humanml3d'
  SMPL_PATH: './deps/smpl'
  WORD_VERTILIZER_PATH: './deps/glove/'
  HUMANML3D:
    FRAME_RATE: 20.0
    UNIT_LEN: 4
    ROOT: './datasets/humanml3d'
  SAMPLER:
    MAX_LEN: 200
    MIN_LEN: 40
    MAX_TEXT_LEN: 20
  PADDING_TO_MAX: false
  WINDOW_SIZE: null
  TEXT_SRC: 'humanml3d'

# ==================== Retrieval 模型参数 ====================
Retrieval:
  CLTemp: 0.1
  CLThr: 0.9
  maxT: 500
  step_aware: 'M1T0'
  NoiseThr: 0.9
  lambda_recons: 1e0
  lambda_kl: 1e-5
  lambda_latent: 1e-5
  lambda_cl: 1e-1

# ==================== 模型路径 ====================
t5_path: 'deps/sentence-t5-large'

model:
  t2m_path: './deps/t2m/'

# ==================== 多表征配置 ====================
MULTI_REPR:
  enabled: false
  repr_types: ['263']  # 可选: ['263', '22x3', '6x25']
  
  # 多表征对齐投影层配置 (仅多表征时生效)
  proj_hidden_dim: 512      # 投影层隐藏层维度
  proj_num_layers: 3        # 投影层层数
  proj_dropout: 0.1         # 投影层 dropout
  
  # 跨表征对齐损失权重
  lambda_cross_repr: 0.1    # 跨表征对齐损失权重
